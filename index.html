<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a3a1a" />
    <title>HefflHoff Farm</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="game-root">
      <canvas id="game-canvas"></canvas>
      <div id="hud">
        <div class="hud-top">
          <div class="resource-pill" data-key="bale">
            <span class="icon">🌾</span><span class="count" data-count="bale">0</span>
          </div>
          <div class="resource-pill" data-key="planks">
            <span class="icon">🪚</span><span class="count" data-count="planks">0</span>
          </div>
          <div class="resource-pill" data-key="tomato">
            <span class="icon">🍅</span><span class="count" data-count="tomato">0</span>
          </div>
          <div class="resource-pill" data-key="potato">
            <span class="icon">🥔</span><span class="count" data-count="potato">0</span>
          </div>
          <div class="resource-pill" data-key="corn">
            <span class="icon">🌽</span><span class="count" data-count="corn">0</span>
          </div>
          <div class="resource-pill" data-key="sauce">
            <span class="icon">🍶</span><span class="count" data-count="sauce">0</span>
          </div>
          <div class="resource-pill" data-key="chips">
            <span class="icon">🍟</span><span class="count" data-count="chips">0</span>
          </div>
          <div class="resource-pill" data-key="egg">
            <span class="icon">🥚</span><span class="count" data-count="egg">0</span>
          </div>
          <div class="resource-pill" data-key="milk">
            <span class="icon">🥛</span><span class="count" data-count="milk">0</span>
          </div>
        </div>
        <div class="hud-center">
          <div id="goal-pill" class="goal-pill" data-ui>
            <span class="goal-icon"></span>
            <span class="goal-body">
              <span class="goal-title"></span>
              <span class="goal-progress">
                <span class="goal-bar"><span class="goal-fill"></span></span>
                <span class="goal-count">0/0</span>
              </span>
            </span>
          </div>
        </div>
        <div class="hud-bottom">
          <div id="user-level-pill" class="user-level-pill" data-ui>
            <div class="ul-badge"><span class="ul-num">1</span></div>
            <div class="ul-body">
              <div class="ul-label">LEVEL</div>
              <div class="ul-bar"><div class="ul-fill"></div></div>
              <div class="ul-xp">0/3 XP</div>
            </div>
          </div>
          <div id="hud-side">
            <button id="hire-btn" class="hud-btn" data-ui>👨‍🌾 Hire <span id="hire-cost">150</span>🪙</button>
            <div id="coin-pill" class="resource-pill coin-pill" data-key="coin">
              <span class="icon">🪙</span><span class="count" data-count="coin">0</span>
            </div>
          </div>
        </div>
      </div>
      <button id="settings-btn" class="settings-btn" data-ui aria-label="Settings">⚙️</button>
      <div id="settings-modal" class="settings-modal" data-ui>
        <div class="settings-panel" data-ui>
          <div class="settings-title">Settings</div>
          <button id="settings-restart" class="settings-btn-large danger" data-ui>🔄 Restart Game</button>
          <button id="settings-logout" class="settings-btn-large" data-ui>👋 Log Out</button>
          <button id="settings-close" class="settings-btn-large secondary" data-ui>Close</button>
        </div>
      </div>
      <div id="toast"></div>
      <div id="level-banner" class="level-banner">
        <div class="banner-inner">
          <div class="banner-badge"><span class="banner-icon"></span></div>
          <div class="banner-text">
            <div class="banner-tier"></div>
            <div class="banner-name"></div>
          </div>
        </div>
      </div>
      <!-- Seed choice modal — appears when player enters empty farm plot -->
      <div id="seed-modal" class="seed-modal">
        <div class="seed-title">Pick a crop</div>
        <div class="seed-buttons">
          <button class="seed-btn" data-crop="tomato">🍅<span>Tomato</span></button>
          <button class="seed-btn" data-crop="potato">🥔<span>Potato</span></button>
          <button class="seed-btn" data-crop="corn">🌽<span>Corn</span></button>
          <button class="seed-btn" data-crop="wheat" data-min-level="3">🌾<span>Wheat</span></button>
        </div>
      </div>
      <!-- World-space DOM overlay (position updated per frame from main.js) -->
      <div id="world-overlay">
        <div id="build-panel" class="build-panel">
          <div class="build-head">
            <span class="build-icon" id="build-icon">🌾</span>
            <span class="build-name" id="build-name">Hay Baler</span>
          </div>
          <div class="build-rows" id="build-rows"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
